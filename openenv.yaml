name: adaptive-cyber-defense
version: "1.0.0"
description: "Autonomous SOC assistant defending a corporate network against multi-stage cyber attacks"
author: "shanmukhgara"
tags:
  - cybersecurity
  - reinforcement-learning
  - multi-agent
  - openenv

tasks:
  - id: easy
    name: Easy Defense
    description: "Defend against 2 simultaneous threats on a clean network"
    difficulty: easy
    passing_score: 0.45
    max_steps: 50

  - id: medium
    name: Medium Defense
    description: "Defend against 3-4 threats with lateral movement enabled"
    difficulty: medium
    passing_score: 0.45
    max_steps: 40

  - id: hard
    name: Hard Defense
    description: "Defend against 5+ threats with all attack types active"
    difficulty: hard
    passing_score: 0.45
    max_steps: 30

observation_space:
  type: dict
  fields:
    - name: active_threats
      type: list
      description: "List of active threats with stage, severity, target_node"
    - name: network_state
      type: dict
      description: "Per-node health, status, and criticality flags"
    - name: resources
      type: dict
      description: "Remaining scan capacity and response slots"
    - name: step
      type: int
      description: "Current time step"
    - name: score
      type: float
      description: "Cumulative reward so far"

action_space:
  type: discrete
  actions:
    - ISOLATE_NODE
    - BLOCK_IP
    - SCAN
    - PATCH_VULNERABILITY
    - RESTORE_NODE
    - BLOCK_LATERAL
    - REVOKE_CREDENTIALS
    - DECRYPT
    - QUARANTINE_SERVICE
    - RUN_DEEP_SCAN
    - DO_NOTHING

reward:
  range: [0.0, 1.0]
  description: "Weighted combination of containment speed, critical node health, and resource efficiency"

docker:
  port: 7860
  health_check: "/_stcore/health"
