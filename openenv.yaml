spec_version: "1.0"
id: adaptive-cyber-defense
name: adaptive-cyber-defense
version: "2.0.0"
description: "Autonomous SOC assistant defending a 5-node corporate network against multi-stage cyber attacks under partial observability"
author: "shanmukhgara"
tags:
  - cybersecurity
  - reinforcement-learning
  - multi-agent
  - openenv
  - mitre-attack

api:
  reset: POST /reset
  step:  POST /step
  state: GET  /state

tasks:
  easy:
    name: Easy Defense
    description: "Detect and block a single phishing attack before it harvests credentials"
    difficulty: easy
    passing_score: 0.55
    max_steps: 30
  medium:
    name: Medium Defense
    description: "Stop malware and ransomware spread across 3 nodes before lateral movement triggers"
    difficulty: medium
    passing_score: 0.55
    max_steps: 50
  hard:
    name: Hard Defense
    description: "Handle multi-stage attacks across all 5 nodes simultaneously with limited scan budget"
    difficulty: hard
    passing_score: 0.45
    max_steps: 30
  nightmare:
    name: Nightmare Defense
    description: "Nation-state APT. All 5 nodes under simultaneous attack. Near-zero detection, maximum evasion, fastest kill chain. Designed to genuinely challenge frontier LLMs."
    difficulty: nightmare
    passing_score: 0.25
    max_steps: 15

  elite:
    name: Elite Defense
    description: "Nation-state persistent threat with insider access. All nodes pre-compromised. Near-zero detection. Kill chain advances every step."
    difficulty: elite
    passing_score: 0.20
    max_steps: 15

  impossible:
    name: Impossible Defense
    description: "AI-driven attacker with perfect counter-strategy. Maximum evasion, instant kill chain, zero resources. Exists to show environment has no ceiling."
    difficulty: impossible
    passing_score: 0.10
    max_steps: 10

observation:
  type: dict
  description: >
    Partially observable environment. Threats are hidden on network nodes and must be
    discovered via SCAN actions or by waiting for natural aging (age >= 5) or stage
    escalation (lateral_movement). The agent sees only scanned or escalated threats.
  fields:
    - name: visible_threats
      type: list
      description: "Threats currently visible to the agent. Each entry includes type, node, stage, age, and MITRE ATT&CK technique ID. Hidden threats are not included."
    - name: hidden_node_count
      type: int
      description: "Number of nodes not yet scanned by the agent (0–5)"
    - name: scan_coverage
      type: float
      description: "Fraction of nodes that have been scanned (0.0 = none, 1.0 = all)"
    - name: system_health
      type: int
      description: "Current system health (0–100). Drops on wrong actions, ignore, or uncontained threats"
    - name: score
      type: float
      description: "Cumulative reward this episode"
    - name: step
      type: int
      description: "Current time step within the episode"
    - name: done
      type: bool
      description: "True when the episode is over (health <= 0 or max steps reached)"

action:
  type: discrete
  description: >
    9 discrete actions. Defense actions only work against visible threats.
    Use SCAN actions to reveal hidden threats before applying mitigations.
    MITRE ATT&CK guides the correct response: T1566→block_ip, T1204/T1486→isolate_machine,
    T1499→patch, T1021→block_ip. Note: Correct action depends on severity and stage.
  actions:
    - name: block_ip
      description: "Neutralises phishing (T1566) and lateral movement (T1021) threats"
    - name: isolate_machine
      description: "Neutralises malware (T1204) and ransomware (T1486) threats"
    - name: patch
      description: "Neutralises DDoS (T1499) threats"
    - name: ignore
      description: "No mitigation applied. Health -10, reward penalty"
    - name: scan_node_1
      description: "Scan node_1 to reveal hidden threats"
    - name: scan_node_2
      description: "Scan node_2 to reveal hidden threats"
    - name: scan_node_3
      description: "Scan node_3 to reveal hidden threats"
    - name: scan_node_4
      description: "Scan node_4 to reveal hidden threats"
    - name: scan_node_5
      description: "Scan node_5 to reveal hidden threats"

reward:
  range: [0.0, 1.0]
  description: >
    Reward is normalized to [0.0, 1.0] via formula: (raw + 2.0) / 4.0, clamped to [0, 1].
    Correct mitigation: raw 1.0 + (system_health / 100) + 0.1 early-neutralization bonus (threat age < 3).
    Wrong mitigation: raw -0.5 - health penalty factor.
    Ignore: raw -1.5.
    Scan reveals threat: raw +0.02.
    Scan finds nothing: raw -0.01.

termination:
  conditions:
    - system_health <= 0
    - step >= max_steps  # per-task: easy=30, medium=50, hard=30, nightmare=20

network:
  nodes: 5
  description: "5-node network (node_1 through node_5). Threats spawn on these nodes."
  assets:
    - id: node_1
      type: workstation
      criticality: 0.3
    - id: node_2
      type: workstation
      criticality: 0.3
    - id: node_3
      type: server
      criticality: 0.7
    - id: node_4
      type: server
      criticality: 0.7
    - id: node_5
      type: database
      criticality: 0.9

mitre_attack:
  version: "14.0"
  techniques:
    - id: T1566
      name: Phishing
      tactic: Initial Access
      mitigation: block_ip
    - id: T1204
      name: User Execution (Malware)
      tactic: Execution
      mitigation: isolate_machine
    - id: T1499
      name: Endpoint Denial of Service
      tactic: Impact
      mitigation: patch
    - id: T1486
      name: Data Encrypted for Impact (Ransomware)
      tactic: Impact
      mitigation: isolate_machine
    - id: T1021
      name: Remote Services (Lateral Movement)
      tactic: Lateral Movement
      mitigation: block_ip

docker:
  port: 7860
  health_check: "/state"
  entrypoint: "uvicorn app:app --host 0.0.0.0 --port 7860"
